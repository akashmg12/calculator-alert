<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #222;
      font-family: Arial;
    }
    .calc {
      background: #333;
      padding: 20px;
      border-radius: 10px;
    }
    input {
      width: 100%;
      height: 50px;
      margin-bottom: 10px;
      font-size: 20px;
      text-align: right;
    }
    button {
      width: 60px;
      height: 60px;
      margin: 5px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="calc">
  <input type="text" id="display" disabled>

  <div>
    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">/</button>
  </div>

  <div>
    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">*</button>
  </div>

  <div>
    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">-</button>
  </div>

  <div>
    <button onclick="press('0')">0</button>
    <button onclick="clearDisplay()">C</button>
    <button id="equal">=</button>
    <button onclick="press('+')">+</button>
  </div>
</div>

<script>
let display = document.getElementById("display");

function press(val) {
  display.value += val;
}

function clearDisplay() {
  display.value = "";
}

// Normal calculator
document.getElementById("equal").onclick = () => {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
};

// 🔴 LONG PRESS ALERT (WORKING)
let timer;
const equalBtn = document.getElementById("equal");

equalBtn.addEventListener("mousedown", startPress);
equalBtn.addEventListener("mouseup", stopPress);
equalBtn.addEventListener("mouseleave", stopPress);

// For mobile
equalBtn.addEventListener("touchstart", startPress);
equalBtn.addEventListener("touchend", stopPress);

function startPress() {
  timer = setTimeout(() => {
    fetch("http://127.0.0.1:5000/alert", {
      method: "POST"
    });
  }, 3000); // 3 sec hold
}

function stopPress() {
  clearTimeout(timer);
}
</script>

</body>
</html>
